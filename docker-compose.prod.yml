# ──────────────────────────────────────────────────────────
#  docker-compose.prod.yml — Afribox Production (VPS OVH)
#
#  Stack :
#    web      → nginx:1.27-alpine + build React (servi statique + proxy /api)
#    backend  → FastAPI (uvicorn) sur python:3.11-slim
#    mongo    → MongoDB 7 (volume persistant, réseau interne)
#
#  Reverse proxy : Traefik v3.6 (externe, /opt/infra/)
#  Domaine        : afriboxlockers.com (+ www → non-www)
#  Middlewares    : afribox-redirect-www, security-headers, gzip-compress
#
#  Usage sur le VPS :
#    cd /opt/afribox-site
#    docker compose -f docker-compose.prod.yml up -d --build
#
#  Variables (cf. .env.prod.example) :
#    MONGO_USER, MONGO_PASSWORD, DB_NAME, CORS_ORIGINS
# ──────────────────────────────────────────────────────────

services:
  # ── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: afribox-mongo
    restart: unless-stopped
    networks:
      - afribox-internal
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── FastAPI backend ──────────────────────────────────────
  backend:
    build: ./backend
    image: afribox-site-api
    container_name: afribox-api
    restart: unless-stopped
    networks:
      - afribox-internal
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      DB_NAME: ${DB_NAME:-afribox}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      mongo:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # 127.0.0.1 explicite — même rationale que web (cf. commit 0e7f503).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/api/',timeout=3); sys.exit(0 if r.status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx + React build (entrée publique via Traefik) ────
  web:
    build: ./frontend
    image: afribox-site-web
    container_name: afribox-web
    restart: unless-stopped
    networks:
      - afribox-internal   # parle à `backend` (proxy /api)
      - proxy-network      # exposé via Traefik
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
      - /var/log/nginx
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # 127.0.0.1 explicite : nginx n'écoute qu'en IPv4 dans cette image
      # (le script d'entrypoint qui active IPv6 échoue silencieusement
      # sous filesystem read_only).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Router principal (HTTPS)
      - "traefik.http.routers.afribox.rule=Host(`afriboxlockers.com`) || Host(`www.afriboxlockers.com`)"
      - "traefik.http.routers.afribox.entrypoints=websecure"
      - "traefik.http.routers.afribox.tls.certresolver=letsencrypt"
      - "traefik.http.routers.afribox.tls.domains[0].main=afriboxlockers.com"
      - "traefik.http.routers.afribox.tls.domains[0].sans=www.afriboxlockers.com"
      - "traefik.http.routers.afribox.middlewares=afribox-redirect-www@docker,security-headers@docker,gzip-compress@docker"
      - "traefik.http.services.afribox.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-network"
      # Middleware www → non-www
      - "traefik.http.middlewares.afribox-redirect-www.redirectregex.regex=^https://www\\.afriboxlockers\\.com/(.*)"
      - "traefik.http.middlewares.afribox-redirect-www.redirectregex.replacement=https://afriboxlockers.com/$${1}"
      - "traefik.http.middlewares.afribox-redirect-www.redirectregex.permanent=true"

networks:
  proxy-network:
    external: true        # créé par /opt/infra/ (Traefik)
  afribox-internal:
    driver: bridge        # interne — mongo+backend+web, jamais exposé

volumes:
  mongo-data:
    name: afribox-site_mongo-data
